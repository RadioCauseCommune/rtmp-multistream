pid = /var/run/stunnel.pid
foreground = yes
debug = info

# ============================================================================
# SECURITE : Vérification des certificats SSL activée
# Le bundle CA système est utilisé pour valider les certificats des plateformes
# ============================================================================

[twitch-live]
client = yes
accept = 0.0.0.0:19352
connect = live.twitch.tv:443
verifyChain = yes
CApath = /etc/ssl/certs
checkHost = live.twitch.tv

[yt-live]
client = yes
accept = 0.0.0.0:19351
connect = a.rtmp.youtube.com:443
verifyChain = yes
CApath = /etc/ssl/certs
checkHost = rtmps.youtube.com

[x-live]
client = yes
accept = 0.0.0.0:19353
connect = live-api-a.x.com:443
verifyChain = yes
CApath = /etc/ssl/certs
checkHost = live-api-a.x.com

[fb-live]
client = yes
accept = 0.0.0.0:19350
connect = live-api-s.facebook.com:443
verifyChain = yes
CApath = /etc/ssl/certs
checkHost = live-api-s.facebook.com
