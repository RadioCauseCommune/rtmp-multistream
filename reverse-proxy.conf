# rtmp.causecommune.fm
# Déployé sur 192.168.10.100

server {
    listen 80;
    server_name rtmp.causecommune.fm;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name rtmp.causecommune.fm;

    ssl_certificate /etc/letsencrypt/live/rtmp.causecommune.fm/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rtmp.causecommune.fm/privkey.pem;
    ssl_session_timeout 1d;
    # ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # ── Dashboard + API : accès protégé ──────────────────────────
    location / {
        auth_basic "Radio Cause Commune";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://192.168.10.108:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── HLS public : diffusion accessible sans auth ──────────────
    location /hls/ {
        proxy_pass http://192.168.10.108:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Ressources publiques (logo, health) ──────────────────────
    location ~ ^/(health|logo) {
        proxy_pass http://192.168.10.108:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Stats & recordings : accès protégé ───────────────────────
    location ~ ^/(stat|recordings) {
        auth_basic "Radio Cause Commune";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://192.168.10.108:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
