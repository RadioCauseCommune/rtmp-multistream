# ============================================================================
# Configuration suggérée pour le Reverse Proxy EXTERNE (10.10.10.49)
# ============================================================================

server {
    listen 80;
    server_name stream.radiocausecommune.org; # À adapter
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name stream.radiocausecommune.org; # À adapter

    # SSL - Utilise tes certificats habituels (Certbot, etc.)
    # ssl_certificate /path/to/cert.pem;
    # ssl_certificate_key /path/to/key.pem;

    # Dashboard de stats
    location / {
        proxy_pass http://10.10.10.XX:8081; # Remplace par l'IP du CT RTMP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Accès aux stats XML et HLS
    location ~ ^/(stat|hls|recordings|health) {
        proxy_pass http://10.10.10.XX:8080; # Remplace par l'IP du CT RTMP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API backend (gestion des plateformes, contrôle des push)
    location /api/ {
        proxy_pass http://10.10.10.XX:8081; # Proxifié via rtmp-stats
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
